<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同无损还原服务</title>
    <!-- 引入 Outfit 与 Inter 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航（去除了切换页签） -->
        <header class="app-header">
            <div class="logo">
                <!-- 自设计盾牌带锁小 Logo -->
                <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <rect x="9" y="11" width="6" height="5" rx="1" ry="1"></rect>
                    <path d="M10 11V9a2 2 0 0 1 4 0v2"></path>
                </svg>
                <span id="logo-text">合同<span class="logo-accent">智能还原</span></span>
            </div>
            <div class="header-actions">
                <button class="btn-theme-toggle" id="btn-theme-toggle" title="切换亮/暗色模式">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sun-icon">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon hidden">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 主内容区域 -->
        <main class="app-content">
            <!-- 仅有文档还原页面 -->
            <section id="tab-restore" class="tab-panel active">
                <div class="upload-screen" id="restore-upload-screen">
                    <div class="upload-card" id="restore-drop-zone">
                        <input type="file" id="restore-file-input" accept=".docx" hidden>
                        <div class="upload-icon-wrapper">
                            <svg class="upload-svg" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="12" y1="8" x2="12" y2="16"></line>
                                <line x1="8" y1="12" x2="16" y2="12"></line>
                            </svg>
                        </div>
                        <h3>拖拽需要还原的脱敏合同 (.docx) 到这里</h3>
                        <p>系统将自动提取文档内隐藏的 UUID 并尝试配对本地数据库</p>
                        <button class="btn btn-primary" onclick="document.getElementById('restore-file-input').click()">选择脱敏文档</button>
                    </div>
                </div>

                <!-- 本地未找到映射时的外置密钥包上传区 -->
                <div class="key-upload-screen hidden" id="restore-key-screen">
                    <div class="glass-card key-card">
                        <div class="warning-icon-wrapper">
                            <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#f59e0b" stroke-width="2">
                                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                                <line x1="12" y1="9" x2="12" y2="13"></line>
                                <line x1="12" y1="17" x2="12.01" y2="17"></line>
                            </svg>
                        </div>
                        <h2>未找到本地配对密钥</h2>
                        <p>该脱敏合同并非在本台设备上处理，或本地历史已被清理。请上传对应的备份密钥包进行辅助还原：</p>
                        
                        <div class="key-drop-zone" id="key-drop-zone">
                            <input type="file" id="key-file-input" accept=".json" hidden>
                            <span class="btn btn-secondary" onclick="document.getElementById('key-file-input').click()">选择备份密钥包 (.json)</span>
                            <p id="key-file-status" class="mt-2 text-muted">尚未选择密钥文件</p>
                        </div>

                        <div class="key-actions">
                            <button class="btn btn-outline" id="btn-cancel-restore">取消并返回</button>
                            <button class="btn btn-primary disabled" id="btn-execute-restore-with-key">开始恢复文档</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/app.js"></script>
</body>
</html>
